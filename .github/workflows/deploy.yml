name: Build, Test, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Start Dev Server
        run: |
          npm run dev &
          echo "Server starting in background..."

      - name: Wait for server port 3000
        run: |
          npx wait-on http://localhost:3000/api/captures --timeout 30000
          echo "Server is active and responding!"

      - name: Run POM Selenium Tests
        run: npm run test:pom

      - name: Run Categories Selenium Tests
        run: npm run test:selenium

      - name: Build Application and Copy Reports
        run: npm run predeploy

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
