<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoProof - POM E2E Test Analysis Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #07090e;
      --bg-card: #0F172A;
      --border: #1E293B;
      --text: #F1F5F9;
      --text-muted: #94A3B8;
      --accent-blue: #3B82F6;
      --accent-emerald: #10B981;
      --accent-rose: #EF4444;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      padding: 2rem;
      line-height: 1.5;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-b: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }
    .header h1 span {
      color: var(--accent-blue);
    }
    .meta-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-cols: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background-color: var(--accent-blue);
    }
    .stat-card.passed::before {
      background-color: var(--accent-emerald);
    }
    .stat-card.failed::before {
      background-color: var(--accent-rose);
    }
    .stat-label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* Search & Filters */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 250px;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1.25rem;
      border-radius: 2rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent-blue);
    }
    .filter-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .pill {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pill:hover, .pill.active {
      background-color: var(--accent-blue);
      border-color: var(--accent-blue);
      color: white;
    }
    .pill.active-passed {
      background-color: var(--accent-emerald);
      border-color: var(--accent-emerald);
    }
    .pill.active-failed {
      background-color: var(--accent-rose);
      border-color: var(--accent-rose);
    }
    
    /* Results Table */
    .table-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      background-color: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.95rem;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .badge-id {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent-blue);
    }
    .badge-module {
      font-size: 0.8rem;
      font-weight: 600;
      background-color: rgba(59,130,246,0.1);
      color: #93C5FD;
      padding: 0.25rem 0.6rem;
      border-radius: 0.5rem;
    }
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.25rem 0.60rem;
      border-radius: 0.5rem;
    }
    .badge-status.passed {
      background-color: rgba(16,185,129,0.1);
      color: var(--accent-emerald);
    }
    .badge-status.failed {
      background-color: rgba(239,68,68,0.1);
      color: var(--accent-rose);
    }
    .font-mono-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>

    let currentModuleFilter = 'ALL';
    let currentStatusFilter = 'ALL';

    function populateTable(filteredData) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      filteredData.forEach(test => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="badge-id">${test['Test ID']}</span></td>
          <td><span class="badge-module">${test['Module']}</span></td>
          <td style="font-weight: 600;">${test['Test Case Name']}</td>
          <td style="color: var(--text-muted); font-size: 0.85rem;">${test['Description']}</td>
          <td>
            <span class="badge-status ${test['Status'].toLowerCase()}">
              ${test['Status'] === 'PASSED' ? '✓ PASS' : '✗ FAIL'}
            </span>
          </td>
          <td><span class="font-mono-val">${test['Duration (ms)']} ms</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function setFilter(filterVal, element) {
      // Remove active states from siblings
      const pills = document.querySelectorAll('.pill');
      pills.forEach(p => p.classList.remove('active', 'active-passed', 'active-failed'));
      
      if (filterVal === 'PASSED') {
        currentStatusFilter = 'PASSED';
        currentModuleFilter = 'ALL';
        element.classList.add('active-passed');
      } else if (filterVal === 'FAILED') {
        currentStatusFilter = 'FAILED';
        currentModuleFilter = 'ALL';
        element.classList.add('active-failed');
      } else {
        currentStatusFilter = 'ALL';
        currentModuleFilter = filterVal;
        element.classList.add('active');
      }
      filterTests();
    }

    function filterTests() {
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = testCases.filter(test => {
        const matchesSearch = test['Test Case Name'].toLowerCase().includes(searchVal) || 
                              test['Test ID'].toLowerCase().includes(searchVal);
                              
        const matchesModule = currentModuleFilter === 'ALL' || test['Module'] === currentModuleFilter;
        const matchesStatus = currentStatusFilter === 'ALL' || test['Status'] === currentStatusFilter;
        
        return matchesSearch && matchesModule && matchesStatus;
      });
      
      populateTable(filtered);
    }

    // Initial load
    populateTable(testCases);
